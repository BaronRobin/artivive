<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Artworks - PersonalAR Admin</title>
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; margin: 0; }
    body { font-family: system-ui, sans-serif; background: #0d0f12; color: #e8e8ea; min-height: 100vh; padding: 2rem 1.25rem; }
    main { max-width: 860px; margin: 0 auto; display: grid; gap: 1.25rem; }
    h1 { font-size: 1.4rem; }
    .hint { color: #9aa0a8; font-size: 0.9rem; }
    button { font: inherit; color: inherit; padding: 0.55rem 0.9rem; border-radius: 8px; border: 1px solid #262b33; background: #16191e; cursor: pointer; }
    button.primary { background: #4a90d9; border-color: #4a90d9; color: #fff; font-weight: 600; }
    #grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 1rem; }
    .card { background: #16191e; border: 1px solid #262b33; border-radius: 12px; overflow: hidden; display: flex; flex-direction: column; }
    .card img { width: 100%; aspect-ratio: 3/4; object-fit: cover; background: #0d0f12; }
    .card .noimg { width: 100%; aspect-ratio: 3/4; display: flex; align-items: center; justify-content: center; color: #9aa0a8; background: #101318; }
    .card .body { padding: 0.8rem; display: grid; gap: 0.5rem; }
    .card .t { font-weight: 600; }
    .card .badges { font-size: 0.75rem; color: #9aa0a8; }
    .card .badges .warn { color: #e8b820; }
    .card .actions { display: flex; gap: 0.4rem; flex-wrap: wrap; }
    .card .actions a, .card .actions button { font-size: 0.8rem; padding: 0.35rem 0.6rem; border-radius: 6px; border: 1px solid #262b33; background: #1c2027; color: inherit; text-decoration: none; cursor: pointer; }
    .card .actions .danger { color: #e0452c; }
  </style>
</head>
<body>
  <main>
    <h1>PersonalAR - Artworks</h1>
    <p class="hint">Local admin (dev server only - never deployed). Workflow: create → compile trigger → edit layers → <code>npm run build</code> → push to publish.</p>
    <div><button class="primary" id="new">+ New artwork</button></div>
    <div id="grid"></div>
  </main>
  <script type="module" src="/src/admin/gallery.js"></script>
</body>
</html>
